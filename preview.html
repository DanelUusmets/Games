<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<title>Trips-Traps-Trull vs AI</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 5px;
    justify-content: center;
  }
  .cell {
    width: 100px;
    height: 100px;
    font-size: 2em;
    cursor: pointer;
    background: #f0f0f0;
    border: 2px solid #333;
  }
  .cell:hover {
    background: #ddd;
  }
  #status {
    margin-top: 20px;
    font-size: 1.3em;
  }
  button {
    margin-top: 15px;
    padding: 10px 20px;
  }
</style>
</head>
<body>

<h1>Trips-Traps-Trull vs AI</h1>

<div class="board" id="board"></div>

<div id="status">Sinu kord (X)</div>
<button onclick="resetGame()">Alusta uuesti</button>

<script>
  const board = document.getElementById("board");
  const statusText = document.getElementById("status");

  let cells = ["", "", "", "", "", "", "", "", ""];
  let gameActive = true;

  const human = "X";
  const ai = "O";

  const winPatterns = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  function createBoard() {
    board.innerHTML = "";
    cells.forEach((_, index) => {
      const cell = document.createElement("button");
      cell.classList.add("cell");
      cell.onclick = () => makeMove(index);
      board.appendChild(cell);
    });
  }

  function makeMove(index) {
    if (!gameActive || cells[index] !== "") return;

    cells[index] = human;
    updateBoard();

    if (checkWinner(human)) {
      statusText.textContent = "Sa võitsid! 🎉";
      gameActive = false;
      return;
    }

    if (isDraw()) {
      statusText.textContent = "Viik!";
      gameActive = false;
      return;
    }

    statusText.textContent = "AI mõtleb...";
    setTimeout(aiMove, 400);
  }

  function aiMove() {
    let move = bestMove();
    cells[move] = ai;
    updateBoard();

    if (checkWinner(ai)) {
      statusText.textContent = "AI võitis 🤖";
      gameActive = false;
      return;
    }

    if (isDraw()) {
      statusText.textContent = "Viik!";
      gameActive = false;
      return;
    }

    statusText.textContent = "Sinu kord (X)";
  }

  function bestMove() {
    // 1. Proovi võita
    for (let i = 0; i < 9; i++) {
      if (cells[i] === "") {
        cells[i] = ai;
        if (checkWinner(ai)) {
          cells[i] = "";
          return i;
        }
        cells[i] = "";
      }
    }

    // 2. Blokeeri mängija
    for (let i = 0; i < 9; i++) {
      if (cells[i] === "") {
        cells[i] = human;
        if (checkWinner(human)) {
          cells[i] = "";
          return i;
        }
        cells[i] = "";
      }
    }

    // 3. Võta keskkoht
    if (cells[4] === "") return 4;

    // 4. Suvaline vaba koht
    let empty = cells.map((v, i) => v === "" ? i : null).filter(v => v !== null);
    return empty[Math.floor(Math.random() * empty.length)];
  }

  function updateBoard() {
    const buttons = document.querySelectorAll(".cell");
    buttons.forEach((btn, i) => {
      btn.textContent = cells[i];
    });
  }

  function checkWinner(player) {
    return winPatterns.some(pattern => {
      const [a, b, c] = pattern;
      return cells[a] === player && cells[b] === player && cells[c] === player;
    });
  }

  function isDraw() {
    return !cells.includes("");
  }

  function resetGame() {
    cells = ["", "", "", "", "", "", "", "", ""];
    gameActive = true;
    statusText.textContent = "Sinu kord (X)";
    createBoard();
  }

  createBoard();
</script>

</body>
</html>
